[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

# SPA: serve index.html for any client-side route the router handles
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
